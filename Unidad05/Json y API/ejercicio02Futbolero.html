<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 2: Futbolero</title>
    <!-- Enlace para obtener el bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <h1>Ejercicio 2: Futbolero</h1>
    <div>
        <select id="teamSelector"></select>
        <div id="info"></div>
    </div>
    <!-- Enlace para el jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $(document).ready(function() {
            // Referencia a los elementos del HTML
            const teamSelector = $("#teamSelector");
            const info = $("#info");

            // Creación del array de los equipos
            let teamList = [];

            // Ejecución de las funciones
            getInfo();
            showInfo();

            // Función para obtener la información de los equipos
            async function getInfo() {
                
                // Variable para consultar a la API
                const consult = await fetch('https://www.thesportsdb.com/api/v1/json/123/search_all_teams.php?l=English_Premier_League');

                // Variable que recoge el resultado de la consulta
                const result = await consult.json();

                // El array vacío que hemos creado lo igualamos al array de la API
                teamList = result.teams;

                // Añadimos una opción al selector que no se pueda elegir para que no seleccione el primer equipo de la API
                teamSelector.append('<option value="" selected disabled>Selecciona un equipo</option>');

                // For each que añade todos los nombres de los equipos al selector
                teamList.forEach(team => {
                    teamSelector.append(`<option value=${team.idTeam}>${team.strTeam}</option>`);
                });
            }

            // Función que muestra la información de los equipos
            function showInfo() {

                // Función que al hacer clic en el selector vaya cambiando los equipos
                teamSelector.on('change', function(event) {

                    // Variable que almacena el id del equipo que ha sido seleccionado (valor)
                    let idSelected = event.target.value;

                    // Variable que almacena el equipo seleccionado (equipo entero)
                    let selectedTeam = teamList.find(team => team.idTeam === idSelected); // .find solo funciona con arrays

                    // Se actualiza el div con la información del equipo
                    info.html(
                        `<h2>${selectedTeam.strTeam}</h2>
                        <p><strong>Formed Year: </strong>${selectedTeam.intFormedYear}</p>
                        <p><strong>Stadium: </strong>${selectedTeam.strStadium}</p>
                        <p><strong>Description: </strong>${selectedTeam.strDescriptionEN}</p>`);
                });
            }
        });
    </script>
</body>
</html>
