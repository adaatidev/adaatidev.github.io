<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 4: Pokédex Básica</title>
    <!-- Enlace para obtener el bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <h1>Basic Pokédex</h1>
    <input id="input" type="text" placeholder="Name or ID">
    <button id="button" type="button">Search</button>
    <div>
        <p id="info"></p>
        <img id="img" src="" alt="Pokémon image" height="200px" width="200px">
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $(document).ready(function() {
            const search = $("#button");
            const infoContainer = $("#info");
            let typesList = "";

            search.on('click', async function () {
                const nameID = $("#input").val().trim().toLowerCase();

                if (nameID === "") {
                    alert("Please, write down a pokémon");
                    return;
                }
                
                const request = await fetch(`https://pokeapi.co/api/v2/pokemon/${nameID}`);
            
                if (!request.ok) {
                    infoContainer.html("<p>Pokémon not found</p>");
                    return;
                }

                const data = await request.json();
                const pokeName = data.name;

                infoContainer.html(`<h2>${pokeName.toUpperCase()}</h2>`);

                const pokeImg = $("#img");

                pokeImg.attr("src", data.sprites.front_default);

                data.types.forEach(type => {
                    typesList += `<span>${type.type.name}</span>`;
                });
            });
        });
    </script>
</body>
</html>
