<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 3: Geolocaliza una IP</title>
    <!-- Enlace para obtener el bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #map {
            margin-top: 20px;
            width: 100%;
            height: 400px;
            background-color: #f0f0f0;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <h1>Geolocaliza una IP</h1>
    <div>
        <input type="text" id="ipInput" placeholder="Introduce IP (ej: 8.8.8.8)">
        <button type="button" id="findButton">Find the IP</button>
        <div id="map">
        <p>El mapa aparecerá aquí...</p>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $(document).ready(function() {
            const button = $("#findButton");
            const mapContainer = $("#map");

            button.on('click', async function() {

                const ipValue = $("#ipInput").val().trim(); 

                if (ipValue === "") {
                    alert("Por favor, introduzca una IP");
                    return;
                }

                const response = await fetch(`http://ip-api.com/json/${ipValue}`);
                const result = await response.json();

                if(result.status === "fail") {
                    alert("IP no válida o no encontrada: " + result.message);
                    return;
                }
                
                const lat = result.lat;
                const lon = result.lon;

                const mapURL = `https://www.openstreetmap.org/export/embed.html?bbox=${lon-0.01},${lat-0.01},${lon+0.01},${lat+0.01}&layer=mapnik&marker=${lat},${lon}`;

                mapContainer.html(`<iframe width="100%" height="100%" frameborder="0" scrolling="no" src="${mapURL}" style="border: 1px solid black"></iframe>`);
        });
    });
    </script>
</body>
</html>
