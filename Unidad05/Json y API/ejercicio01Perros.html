<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 1: Perros</title>
    <!-- Enlace para obtener el bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <h1>Ejercicio 1: Perros</h1>
    <div>
        <button id="random"">Random dog</button>
        <select id="selector">
            <option value="" selected disabled>Choose a dog breed</option>
        </select>
    </div>
    <div>
        <img id="dogImg" src="" style="max-height: 500px;" alt="Imagen de perro">
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $(document).ready(function() {
            // Variables que hacen referencia a los elementos del HTML
            const button = $("#random");
            const select = $("#selector");
            const img = $("#dogImg");

            button.on('click', async function() {
                const response = await fetch('https://dog.ceo/api/breeds/image/random');
                const data = await response.json();
                img.attr("src", data.message);
            });

            selectorList();

            async function selectorList() {
                const response2 = await fetch('https://dog.ceo/api/breeds/list/all');
                const data2 = await response2.json();
                let breedList = data2.message;

                for (let breed in breedList) {
                    let nacionality = breedList[breed];
                    if (nacionality.length === 0) {
                        select.append(`<option value=${breed}>${breed}</option>`);
                    } else {
                        let dogGroup = $(`<optgroup label=${breed}></optgroup>`);
                        
                        nacionality.forEach(dogNation => {
                            dogGroup.append(`<option value=${breed}-${dogNation}>${dogNation}</option>`);
                        });    
                        select.append(dogGroup);
                    }
                };
            };

            select.on('change', async function(event) {
                let dogSelected = event.target.value;
                let breedPath = dogSelected.replace("-", "/")
                let dogURL = `https://dog.ceo/api/breed/${breedPath}/images/random`;

                const response3 = await fetch(dogURL);
                const data3 = await response3.json();

                const dogImage = data3.message;

                img.attr("src", dogImage);
            });

        });
    </script>
</body>
</html>
