<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 1: Infiltración en el Servidor</title>
    <style>
        #mensaje-exito {
            color: green;
        }
        body {
            margin-left: 30px;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        }
    </style>
</head>
<body>
    <h1>Ejercicio 1: Infiltración en el Servidor</h1>
    <h2>Ada Atienza Devós</h2>

    <button type="button" id="btn-instrucciones">Instrucciones</button>

    <h2 id="mensaje-exito"></h2>

    <form id="form-infiltracion">
        <input type="hidden" id="nom_alum" name="nom_alum" value="Ada">
        <input type="hidden" id="num_ejer" name="num_ejer" value="1">
    
        <label for="nombre">Nombre</label><br>
        <input type="text" id="nombre" name="nombre" required><br>
    
        <label for="apellidos">Apellidos</label><br>
        <input type="text" id="apellidos" name="apellidos" required><br>
    
        <label for="password">Contraseña</label><br>
        <input type="password" id="password" name="password" value="1q2w3e" required>
    
        <input type="hidden" id="llave" name="llave" value=""><br><br>
    
        <button type="submit" id="btn-enviar">Enviar</button>
    </form>

    <ol id="instrucciones"></ol>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script>
        $(document).ready(function() {
            const apiUrl = "http://192.168.100.150/api/secret";

            $('#btn-instrucciones').click(function() {
                // Primero se vacía la lista para que no hayan duplicaciones
                $('#instrucciones').empty();

                $.ajax({
                    // A dónde va el paquete
                    url: apiUrl, 
                    // Tipo de acción
                    type: 'GET', 
                    // Formato de respuesta
                    dataType: 'json', 
                    // Si todo sale bien
                    success: function(response) {
                        // Recorre el array, por cada elemento crea un nuevo elemento en la lista y lo añade a ella
                        $.each(response, function(index, instruccion) {
                            let nuevoElemento = $('<li>').text(instruccion);
                            $('#instrucciones').append(nuevoElemento);
                        });
                        // Escribe el mensaje verde de éxito
                        $('#mensaje-exito').text("¡Instrucciones de la misión cargadas con éxito!");
                        // Mensaje para verificar el flujo de datos desde la consola
                        console.log("Fase 1 completada. Servidor respondió:", response);
                    }, 
                    // Si algo sale mal
                    error: function(xhr, status, error) {
                        // Imprime por consola toda la información sobre el error
                        console.error("Error en la fase 1 (GET): ", status, error);
                        console.log("Cuerpo de la respuesta de error: ", xhr.responseText);
                    }
                });
            });

            // Envío del formulario
            $('#form-infiltracion').submit(function(event) { 
                // Detenemos la recarga automática de la página que hace el navegador por defecto
                event.preventDefault();

                // Serialización de los datos del formulario a enviar
                let datosParaEnviar = $(this).serialize();

                // Control por consola
                console.log("Enviando el siguiente paquete de datos al servidor:", datosParaEnviar);

                $.ajax({
                    // A dónde va el paquete
                    url: apiUrl, 
                    // Tipo de acción
                    type: 'POST',
                    // Qué se va a mandar
                    data: datosParaEnviar,
                    // Formato de respuesta
                    dataType: 'json', 
                    // Si todo sale bien
                    success: function(response) {
                        // Si la respuesta es correcta se pone el mensaje de la respuesta en el título h2 verde
                        if (response.status === "success" || response.status === true) {
                            $('#mensaje-exito').text(response.message);
                        }
                        // Control por consola
                        console.log("Respuesta del servidor al enviar el formulario", response);
                    },
                    // Si algo sale mal
                    error: function(xhr, status, error) {
                        // Imprime por consola toda la información sobre el error
                        console.error("Error en la fase 2 (POST): ", status, error);
                        console.log("Cuerpo de la respuesta de error: ", xhr.responseText);
                    }
                });
            });
        });
    </script>
</body>
</html>
