<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 2: El Juego de los Cubiletes</title>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        /* Estilos distintivos para los mensajes de éxito/error */
        .msg-exito { color: green; font-weight: bold; }
        .msg-error { color: red; font-weight: bold; }
        /* Estilo básico para los botones de los vasos */
        .btn-vaso {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 15px 25px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }
        .btn-vaso:hover { background-color: #2980b9; }
        #zona-juego { margin-top: 20px; }
    </style>
</head>
<body>

    <h1>Ejercicio 2: Los Cubiletes (¿Dónde está la bolita?)</h1>
    <h2>Desarrollado por: [Tu Nombre Aquí]</h2>

    <form id="form-login">
        <input type="hidden" name="nom_alum" id="nom_alum" value="Tu Nombre Real">

        <input type="hidden" name="num_ejer" id="num_ejer" value="2">

        <label for="usuario">Usuario:</label>
        <input type="text" name="usuario" id="usuario" required>

        <label for="password">Contraseña:</label>
        <input type="password" name="password" id="password" required>

        <button type="submit" id="btn-enviar">Enviar</button>
    </form>

    <div id="zona-juego">
        <h2 id="mensaje-servidor"></h2>

        <div id="contenedor-vasos"></div>

        <div id="seccion-ranking" style="display:none;">
            <h3>Ranking de Ganadores:</h3>
            <ol id="lista-ranking"></ol>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            // URLs de la API suministradas por el enunciado
            const urlLogin = "http://192.168.190.150/api/vasos";
            const urlJugar = "http://192.168.190.150/api/jugar";

            // Variable global para saber si el usuario ya está logueado (Fase 4: Reinicio)
            let usuarioLogueado = false;

            // ==========================================================
            // MANEJADOR DEL FORMULARIO (FASE 1: LOGIN / FASE 4: REINICIO)
            // ==========================================================
            $('#form-login').submit(function(event) {
                event.preventDefault(); // Frenamos la recarga de la página

                // Validación manual por código de que los campos tienen valores válidos
                let userVal = $('#usuario').val().trim();
                let passVal = $('#password').val().trim();

                if (userVal === "" || passVal === "") {
                    alert("Por favor, rellena todos los campos con valores válidos.");
                    return; // Detiene la ejecución si están vacíos
                }

                // --- REQUISITO 4: REINICIO ---
                // Si el usuario ya se había logueado antes, este botón actúa como REINICIO
                if (usuarioLogueado) {
                    // Limpiamos la pantalla de la partida anterior
                    $('#mensaje-servidor').text("").removeClass();
                    $('#seccion-ranking').hide();
                    $('#lista-ranking').empty();
                    
                    // Volvemos a pedir la configuración de la partida (reutilizando los mismos datos)
                    solicitarConfiguracionPartida();
                    return; 
                }

                // --- FASE 1: LOGIN PRIMERA VEZ ---
                solicitarConfiguracionPartida();
            });

            // Función aislada para conectar a la API de vasos y pintar la configuración
            function solicitarConfiguracionPartida() {
                let datosFormulario = $('#form-login').serialize();

                $.ajax({
                    url: urlLogin,
                    type: 'POST',
                    data: datosFormulario,
                    dataType: 'json',
                    success: function(response) {
                        console.log("Login/Configuración exitosa:", response);

                        // Activamos la bandera de que ya estamos dentro del juego
                        usuarioLogueado = true;

                        // Bloqueamos los inputs de texto para que no se puedan cambiar (Requisito)
                        $('#usuario').prop('disabled', true);
                        $('#password').prop('disabled', true);

                        // Limpiamos el contenedor de vasos por si había de una partida anterior
                        $('#contenedor-vasos').empty();

                        // Asumimos que la API nos devuelve una propiedad con el número de vasos
                        // Ejemplo: response.numero_vasos o response.vasos
                        let cantidadVasos = response.numero_vasos || response.vasos || 3; 

                        // Pintamos en pantalla tantos botones como vasos nos devuelva la API
                        for (let i = 1; i <= cantidadVasos; i++) {
                            let boton = $('<button>')
                                            .text("Vaso " + i)
                                            .addClass('btn-vaso')
                                            .attr('data-id-vaso', i); // Guardamos su número en un atributo personalizado
                            
                            $('#contenedor-vasos').append(boton);
                        }

                        $('#mensaje-servidor').text("¡Elige un vaso! La bola está escondida...").removeClass();
                    },
                    error: function(xhr, status, error) {
                        console.error("Error en el acceso:", status, error);
                        $('#mensaje-servidor').text("Error de autenticación. Revisa la consola.").addClass('msg-error');
                    }
                });
            }

            // ==========================================================
            // FASE 2: LA PARTIDA Y LOS RESULTADOS (Clic en los vasos)
            // ==========================================================
            // Usamos Event Delegation (on) porque los botones se crean dinámicamente
            $(document).on('click', '.btn-vaso', function() {
                // Obtenemos el número de vaso que el jugador pulsó
                let vasoElegido = $(this).attr('data-id-vaso');
                let usuarioActual = $('#usuario').val();

                // Bloqueamos inmediatamente todos los botones de los vasos para evitar doble clic
                $('.btn-vaso').prop('disabled', true);

                // Preparamos los datos solicitados por la ruta /api/jugar
                let datosJugada = {
                    usuario: usuarioActual,
                    vaso: vasoElegido
                };

                console.log("Enviando jugada al servidor...", datosJugada);

                // Petición POST para comprobar el resultado de la partida
                $.ajax({
                    url: urlJugar,
                    type: 'POST',
                    data: datosJugada,
                    dataType: 'json',
                    success: function(response) {
                        console.log("Resultado de la jugada recibido:", response);

                        // 1. Borramos los botones de los vasos de la pantalla
                        $('#contenedor-vasos').empty();

                        // 2. Mostramos el mensaje con color distintivo según el status
                        // Evaluamos si el servidor devuelve "success", "error", o si acertó
                        if (response.status === "success" || response.resultado === "ganado") {
                            $('#mensaje-servidor').text(response.message || response.mensaje).addClass('msg-exito');
                        } else {
                            $('#mensaje-servidor').text(response.message || response.mensaje).addClass('msg-error');
                        }

                        // Añadimos información extra sobre cuál era el vaso ganador si la API lo manda
                        if(response.vaso_ganador) {
                            $('#mensaje-servidor').append("<br><small>El vaso ganador era el: " + response.vaso_ganador + "</small>");
                        }

                        // 3. Renderizamos el ranking de ganadores
                        $('#lista-ranking').empty(); // Limpiamos rastro viejo
                        if (response.ranking && response.ranking.length > 0) {
                            $.each(response.ranking, function(index, jugador) {
                                $('#lista-ranking').append($('<li>').text(jugador));
                            });
                            $('#seccion-ranking').show(); // Hacemos visible la sección
                        }
                    },
                    error: function(xhr, status, error) {
                        console.error("Error al procesar la jugada:", status, error);
                        // En caso de error de red, desbloqueamos los vasos por si quiere reintentar
                        $('.btn-vaso').prop('disabled', false);
                    }
                });
            });
        });
    </script>
</body>
</html>
