<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 2: MEGARETO</title>
    <!-- Enlace para obtener el bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <h1>Users data</h1>
    <form>
        <fieldset>
            <legend>Input data</legend>
            <input type="text" id="nameInput" placeholder="Name" required>
            <input type="text" id="lastInput" placeholder="Last name" required>
            <input type="number" id="ageInput" placeholder="Age" required>
            <input type="text" id="cityInput" placeholder="City" required>
            <button type="button" id="addButton">Add</button>
        </fieldset>
    </form>
    <table border="1">
        <thead>
            <tr>
                <th>Name</th>
                <th>Last name</th>
                <th>Age</th>
                <th>City</th>
            </tr>
        </thead>
        <tbody id="table"></tbody>
    </table>
    <br>
    <div id="ageData">
        <p>Suma: <span id="suma"></span></p>
        <p>Media: <span id="media"></span></p>
        <p>Máx: <span id="max"></span></p>
        <p>Mín: <span id="min"></span></p>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $(document).ready(function() {
            const button = $("#addButton");
            let objArray = [];

            button.on('click', function() {
                let data = {
                    name: $("#nameInput").val().trim(),
                    lastName: $("#lastInput").val().trim(),
                    age: $("#ageInput").val().trim(),
                    city: $("#cityInput").val().trim()
                };

                if (data.name && data.lastName && data.age && data.city) {
                    let table = $("#table");
                    insertFila(table, data);
                    //calculate(data.age);
                    cleanData();
                } else {
                    alert("Todos los campos deben estar rellenos");
                }

                objArray += data;

            });

            function cleanData() {
            $("#nameInput, #lastInput, #ageInput, #cityInput").val("");
            }

            function insertCelda(row, data) {
            row.insertCell().textContent = data.name;
            row.insertCell().textContent = data.lastName;
            row.insertCell().textContent = data.age;
            row.insertCell().textContent = data.city;
            }

            function insertFila(table, data) {
            let row = table.insertRow();
            row.on('click', function () {
                let ifDelete = confirm(`You wish to delete ${data.name} ${data.lastName}?`);
                if (ifDelete) {
                    this.remove();
                }
            });
            insertCelda(row, data);
        }
        });
    </script>
</body>
</html>
