<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Juego del Ahorcado</title>
</head>
<body>
    <h1>El Juego del Ahorcado</h1>
    <p id="mensaje"></p>
    <input type="text" maxlength="1" id="inputLetra" placeholder="A">
    <button id="boton">Probar letra</button>

    <script>
        // Array con las palabras a elegir
        const arrayPalabras = ["gwen", "soraka", "lulu", "nami", "leona", "seraphine"];
        
        // Variable que almacena la palabra elegida
        let palabraAdivinar = "";

        // Array para las letras adivinadas (inputs del usuario)
        let arrayUsuario = []; 

        const mensajeElement = document.getElementById("mensaje");
        const inputElement = document.getElementById("inputLetra");
        const botonElement = document.getElementById("boton");

        // Funcion que elige una palabra aleatoria del array de palabras, recibe el array de las palabras y devuelve la palabra
        function eligePalabra(palabras) {
            const indiceAleatorio = Math.floor(Math.random() * palabras.length);
            return palabras[indiceAleatorio].toLowerCase();
        }

        // Función que inicia el tablero a guiones bajos, recibe la palabra y devuelve los guiones impreso (llamando a otra función)
        function inicializaTablero(palabra) {
            arrayUsuario = Array(palabra.length).fill("_");
            dibujaTablero();
        }

        // Función que modifica el mensaje y dibuja el tablero
        function dibujaTablero() {
            mensajeElement.textContent = arrayUsuario.join(" ");
        }

        // Función que vacía el input, recibe el input
        function vaciaInput(input) {
            input.value = "";
            input.focus();
        }

        /**
         * Comprueba si la letra existe y actualiza el array del usuario.
         * @return {boolean} true si la letra estaba en la palabra.
         */
        function procesarIntento(letra) {
            let acierto = false;
            for (let i = 0; i < palabraAdivinar.length; i++) {
                if (palabraAdivinar[i] === letra) {
                    arrayUsuario[i] = letra;
                    acierto = true;
                }
            }
            return acierto;
        }

        // Función que comprueba si el usuario ha ganado
        function comprobarVictoria() {
            return !arrayUsuario.includes("_");
        }

        // Función que muestra que el usuario ha ganado y la palabra que era
        function finalizarJuego() {
            alert("¡Felicidades! Has ganado. La palabra era: " + palabraAdivinar);
        }

        // Función que verifica el turno del usuario, comprueba que el input no esté vacío, si no lo está ejecuta las funciones necesarias para que el juego siga
        function ejecutarTurno() {
            const letra = inputElement.value.toLowerCase();
            
            if (letra === "") return;

            procesarIntento(letra);
            dibujaTablero();
            vaciaInput(inputElement);

            if (comprobarVictoria()) {
                finalizarJuego();
            }
        }

        // Función que inicializa el juego eligiendo una palabra al azar
        function iniciarJuego() {
            palabraAdivinar = eligePalabra(arrayPalabras);
            inicializaTablero(palabraAdivinar);

            botonElement.addEventListener("click", ejecutarTurno);
        }

        iniciarJuego();

    </script>
</body>
</html>
