<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima Local - Ejercicio 5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            transition: background-color 0.8s ease, color 0.8s ease; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        /* Estilos para el modo día y noche (Reto) */
        .day-mode { background-color: #87CEEB; color: #333; }
        .night-mode { background-color: #2c3e50; color: #ecf0f1; }
        
        .weather-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            max-width: 400px;
            width: 100%;
        }
    </style>
</head>
<body class="day-mode"> <div class="weather-card shadow-lg p-4 text-center">
    <h2 class="mb-4">Consulta el Clima</h2>
    
    <div class="input-group mb-3">
        <input type="text" id="city-input" class="form-control" placeholder="Ej: Madrid, Tokyo...">
        <button class="btn btn-primary" id="get-weather">Buscar</button>
    </div>

    <div id="weather-info" class="d-none">
        <h3 id="display-city" class="fw-bold"></h3>
        <div class="display-1 my-3"><span id="temp"></span>°C</div>
        <p class="lead">Viento: <span id="wind"></span> km/h</p>
    </div>

    <div id="error-msg" class="text-danger d-none mt-2">Ciudad no encontrada.</div>
</div>

<script>
    const btn = document.getElementById('get-weather');
    const input = document.getElementById('city-input');
    const infoDiv = document.getElementById('weather-info');

    btn.addEventListener('click', async () => {
        const cityName = input.value;
        if (!cityName) return;

        try {
            // 1. Obtener coordenadas (Geocodificación) [cite: 30]
            const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${cityName}`);
            const geoData = await geoRes.json();

            if (!geoData.results) throw new Error("Ciudad no encontrada");

            // Extraemos latitud y longitud del primer resultado 
            const { latitude, longitude, name } = geoData.results[0];

            // 2. Obtener el clima usando las coordenadas 
            const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
            const weatherData = await weatherRes.json();

            renderWeather(name, weatherData.current_weather);

        } catch (error) {
            document.getElementById('error-msg').classList.remove('d-none');
            infoDiv.classList.add('d-none');
        }
    });

    function renderWeather(city, weather) {
        // Mostrar datos solicitados 
        document.getElementById('display-city').textContent = city;
        document.getElementById('temp').textContent = weather.temperature;
        document.getElementById('wind').textContent = weather.windspeed;

        // Reto: Cambio de fondo basado en is_day 
        if (weather.is_day === 1) {
            document.body.className = 'day-mode';
        } else {
            document.body.className = 'night-mode';
        }

        infoDiv.classList.remove('d-none');
        document.getElementById('error-msg').classList.add('d-none');
    }
</script>

</body>
</html>
