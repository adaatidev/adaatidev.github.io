<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ejercicio 3: Geolocalizar IP</title>
    <style>
        body {
            margin-left: 30px;
        }

        .resultado-bloque {
            margin-top: 20px;
            display: none;
            max-width: 600px;
        }

        .info-detalles {
            border: 1px solid #ccc;
            padding: 15px;
            background-color: #f9f9f9;
            margin-bottom: 15px;
        }

        iframe {
            width: 100%;
            height: 350px;
            border: 1px solid #ccc;
        }
    </style>
</head>

<body>
    <h1>Ejercicio 3: Geolocaliza una IP</h1>

    <form id="form-ip">
        <label for="input-ip">Introduce una dirección IP (Ej: 8.8.8.8):</label><br><br>
        <input type="text" id="input-ip" placeholder="Ej: 8.8.8.8" required>
        <button type="submit" id="btn-buscar">Buscar</button>
    </form>

    <div id="zona-resultado" class="resultado-bloque">

        <div class="info-detalles">
            <h3>Información de la IP</h3>
            <p><strong>País:</strong> <span id="res-pais"></span></p>
            <p><strong>Ciudad:</strong> <span id="res-ciudad"></span></p>
            <p><strong>Proveedor de Internet (ISP):</strong> <span id="res-isp"></span></p>
            <p><strong>Coordenadas:</strong> <span id="res-coordenadas"></span></p>
        </div>

        <h3>Ubicación en el Mapa</h3>
        <iframe id="mapa-google" src="" frameborder="0" scrolling="no" marginheight="0" marginwidth="0"></iframe>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script>
        $(document).ready(function () {
            $('#form-ip').submit(function (event) {
                event.preventDefault();

                let ipBuscada = $('#input-ip').val().trim();

                let urlApi = "http://ip-api.com/json/" + ipBuscada;

                console.log("Conectando a la API de IP:", urlApi);

                $.ajax({
                    url: urlApi,
                    type: "GET",
                    dataType: "json",
                    success: function (response) {
                        console.log("Datos de geolocalización recibidos:", response);

                        if (response.status === "success") {

                            $('#res-pais').text(response.country);
                            $('#res-ciudad').text(response.city);
                            $('#res-isp').text(response.isp);
                            $('#res-coordenadas').text(response.lat + ", " + response.lon);

                            let urlMapaEmbed = "https://maps.google.com/maps?q=" + response.lat + "," + response.lon + "&t=&z=13&ie=UTF8&iwloc=&output=embed";

                            $('#mapa-google').attr('src', urlMapaEmbed);

                            $('#zona-resultado').show();

                        } else {
                            alert("No se ha podido localizar esa IP. Asegúrate de que tiene un formato válido.");
                            $('#zona-resultado').hide();
                        }
                    },
                    error: function (xhr, status, error) {
                        console.error("Error al conectar con la API:", status, error);
                        alert("Hubo un error al realizar la búsqueda.");
                    }
                });
            });

        });
    </script>
</body>

</html>
