<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ejercicio 3: RETO - Limitar Checkboxes</title>
    <style>
        body {
            margin-left: 30px;
        }
    </style>
</head>

<body>
    <h1>Ejercicio 3: RETO</h1>

    <form id="formulario-persona">
        <div class="campo"><label>Nombre:</label><input type="text" id="input-nombre" required></div>
        <div class="campo"><label>Apellidos:</label><input type="text" id="input-apellidos" required></div>
        <div class="campo"><label>Edad:</label><input type="number" id="input-edad" required></div>
        <div class="campo"><label>Ciudad:</label><input type="text" id="input-ciudad" required></div>

        <fieldset>
            <legend>Hobbies (elige máximo 3)</legend>
            <div class="checkbox-group">
                <label><input type="checkbox" name="hobbies[]" value="Deporte"> <span>Deporte</span></label>
                <label><input type="checkbox" name="hobbies[]" value="Lectura"> <span>Lectura</span></label>
                <label><input type="checkbox" name="hobbies[]" value="Música"> <span>Música</span></label>
                <label><input type="checkbox" name="hobbies[]" value="Juegos"> <span>Juegos</span></label>
                <label><input type="checkbox" name="hobbies[]" value="Cine"> <span>Cine</span></label>
                <label><input type="checkbox" name="hobbies[]" value="Teatro"> <span>Teatro</span></label>
                <label><input type="checkbox" name="hobbies[]" value="Coleccionismo"> <span>Coleccionismo</span></label>
                <label><input type="checkbox" name="hobbies[]" value="Bricolaje"> <span>Bricolaje</span></label>
                <label><input type="checkbox" name="hobbies[]" value="Cosplay"> <span>Cosplay</span></label>
            </div>
        </fieldset>

        <button type="submit">Pulsa para insertar</button>
    </form>

    <table border="1">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Apellidos</th>
                <th>Edad</th>
                <th>Ciudad</th>
                <th>Hobbies</th>
            </tr>
        </thead>
        <tbody id="cuerpo-tabla">
        </tbody>
    </table>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script>
        $(document).ready(function () {

            $('input[name="hobbies[]"]').change(function () {

                let marcados = $('input[name="hobbies[]"]:checked').length;
                console.log("Casillas seleccionadas en este momento: " + marcados);

                if (marcados >= 3) {
                    $('input[name="hobbies[]"]').not(':checked').prop('disabled', true);
                } else {
                    $('input[name="hobbies[]"]').prop('disabled', false);
                }
            });

            function crearFilaPersona(nombre, apellidos, edad, ciudad, listaHobbies) {
                let fila = $('<tr>');
                let textoHobbies = listaHobbies.length > 0 ? listaHobbies.join(', ') : '-';

                fila.append(
                    $('<td>').text(nombre),
                    $('<td>').text(apellidos),
                    $('<td>').text(edad),
                    $('<td>').text(ciudad),
                    $('<td>').text(textoHobbies)
                );
                return fila;
            }

            $('#formulario-persona').submit(function (event) {
                event.preventDefault();

                let nombre = $('#input-nombre').val().trim();
                let apellidos = $('#input-apellidos').val().trim();
                let edad = $('#input-edad').val().trim();
                let ciudad = $('#input-ciudad').val().trim();

                let hobbiesSeleccionados = $('input[name="hobbies[]"]').filter(':checked').map(function () {
                    return $(this).val();
                }).get();

                let nuevaFila = crearFilaPersona(nombre, apellidos, edad, ciudad, hobbiesSeleccionados);
                $('#cuerpo-tabla').append(nuevaFila);

                this.reset();
                $('input[name="hobbies[]"]').prop('disabled', false);
            });

        });
    </script>
</body>

</html>
