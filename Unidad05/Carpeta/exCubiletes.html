<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 2: Los cubiletes</title>
    <style>
        body {
            margin-left: 30px;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        }

        .msg-exito {
            color: green;
            font-weight: bold;
        }

        .msg-error {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h1>Ejercicio 2: Los cubiletes</h1>
    <h2>Ada</h2>

    <form id="form-login">
        <input type="hidden" id="nom_alum" name="nom_alum" value="Ada">
        <input type="hidden" id="num_ejer" name="num_ejer" value="2">

        <label for="usuario">Usuario</label><br>
        <input type="text" id="usuario" name="usuario" required><br>

        <label for="password">Contraseña</label><br>
        <input type="password" id="password" name="password" required><br><br>

        <button type="submit" id="btn-enviar">Enviar</button>
    </form>

    <div id="zona-juego">
        <h2 id="mensaje-servidor"></h2>

        <div id="contenedor-vasos"></div>

        <div id="seccion-ranking" style="display:none;">
            <h3>Ranking de Ganadores:</h3>
            <ol id="lista-ranking"></ol>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script>
        $(document).ready(function () {
            // Se almacenan los enlaces de las API en variables
            const urlLogin = "http://192.168.190.150/api/vasos";
            const urlJugar = "http://192.168.190.150/api/jugar";
            // De normal el usuario no está logueado
            let usuarioLogueado = false;

            // Cuando se manda el formulario
            $('#form-login').submit(function (event) {
                // Se evita que se recargue la página completa
                event.preventDefault();

                // Variables que almacenan el nombre y la contraseña
                let userVal = $('#usuario').val().trim();
                let passVal = $('#password').val().trim();

                // Si el nombre o la contraseña introducidas están vacías devuelve un alert y detiene la función con el return
                if (userVal === "" || passVal === "") {
                    alert("Todos los campos deben estar completados con valores válidos.");
                    return;
                }

                // Si el usuario ya está logueado
                if (usuarioLogueado) {
                    // Reinicia la interfaz visual antes de pedir nuevos vasos
                    $('#mensaje-servidor').text("").removeClass();
                    $('#seccion-ranking').hide();
                    $('#lista-ranking').empty();

                    // Ejecuta la función auxiliar para pedir la configuración de la partida
                    solicitarConfiguracionPartida();
                    return;
                }

                // Si no estaba logueado no hace falta que reinicie nada
                solicitarConfiguracionPartida();
            });

            // Función para pedir la configuración (vasos)
            function solicitarConfiguracionPartida() {
                let datosFormulario = $('#form-login').serialize();

                $.ajax({
                    url: urlLogin,
                    type: 'POST',
                    data: datosFormulario,
                    dataType: 'json',
                    success: function (response) {
                        console.log("Login exitoso: ", response);

                        usuarioLogueado = true;

                        // Bloquea los inputs de login
                        $('#usuario').prop('disabled', true);
                        $('#password').prop('disabled', true);

                        $('#contenedor-vasos').empty();

                        let cantidadVasos = response.num_vasos || 3; // Por seguridad, si falla toma 3 por defecto

                        // Bucle de fabricación dinámica de botones
                        for (let i = 1; i <= cantidadVasos; i++) {
                            let boton = $('<button>').text("Vaso " + i).addClass('btn-vaso').attr('data-id-vaso', i);
                            $('#contenedor-vasos').append(boton);
                        }
                        $('#mensaje-servidor').text("Elige un vaso, la bola está escondida...").removeClass();
                    },
                    error: function (xhr, status, error) {
                        console.error("Error en el acceso.", status, error);
                        $('#mensaje-servidor').text("Error de autenticación. Revisa la consola.").addClass('msg-error');
                    }
                });
            }

            $(document).on('click', '.btn-vaso', function () {
                let vasoElegido = $(this).attr('data-id-vaso');

                let usuarioActual = $('#usuario').val();

                $('.btn-vaso').prop('disabled', true);

                let datosJugada = {
                    usuario: usuarioActual,
                    vaso: vasoElegido
                };

                console.log("Enviando jugada al servidor...", datosJugada);

                $.ajax({
                    url: urlJugar,
                    type: 'POST',
                    data: datosJugada,
                    dataType: 'json',
                    success: function (response) {
                        console.log("Resultado de la jugada recibido:", response);

                        $('#contenedor-vasos').empty();

                        $('#mensaje-servidor').removeClass('msg-exito msg-error');

                        if (response.status === "success" || response.resultado === "ganado") {
                            $('#mensaje-servidor').text(response.message || response.mensaje).addClass('msg-exito');
                        } else {
                            $('#mensaje-servidor').text(response.message || response.mensaje).addClass('msg-error');
                        }

                        if (response.vaso_ganador) {
                            $('#mensaje-servidor').append("<br><small>El vaso ganador era el: " + response.vaso_ganador + "</small>");
                        }

                        $('#lista-ranking').empty();

                        if (response.ranking && response.ranking.length > 0) {
                            $.each(response.ranking, function (index, jugador) {
                                $('#lista-ranking').append($('<li>').text(jugador));
                            });
                            $('#seccion-ranking').show();
                        }
                    },
                    error: function (xhr, status, error) {
                        console.error("Error al procesar la jugada: ", status, error);
                        $('.btn-vaso').prop('disabled', false);
                    }
                });
            });

        });
    </script>
</body>

</html>
