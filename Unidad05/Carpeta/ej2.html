<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ejercicio 2: Insertar datos dinámicos</title>
    <style>
        body {
            margin-left: 30px;
        }
    </style>
</head>

<body>
    <h1>Ejercicio 2: Insertar datos dinámicos</h1>

    <form id="formulario-persona">
        <h3>Añadir Nueva Persona</h3>
        <div class="campo">
            <label for="input-nombre">Nombre:</label>
            <input type="text" id="input-nombre" required placeholder="Ej: Maria">
        </div>
        <div class="campo">
            <label for="input-apellidos">Apellidos:</label>
            <input type="text" id="input-apellidos" required placeholder="Ej: López">
        </div>
        <div class="campo">
            <label for="input-edad">Edad:</label>
            <input type="number" id="input-edad" required placeholder="Ej: 30">
        </div>
        <div class="campo">
            <label for="input-ciudad">Ciudad:</label>
            <input type="text" id="input-ciudad" required placeholder="Ej: Barcelona">
        </div>
        <button type="submit">Agregar a la Tabla</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Apellidos</th>
                <th>Edad</th>
                <th>Ciudad</th>
            </tr>
        </thead>
        <tbody id="cuerpo-tabla">
            <tr>
                <td>Alberto</td>
                <td>Ramos</td>
                <td>26</td>
                <td>Granada</td>
            </tr>
        </tbody>
    </table>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>

    <script>
        $(document).ready(function () {

            function crearFilaPersona(nombre, apellidos, edad, ciudad) {
                let fila = $('<tr>');

                let tdNombre = $('<td>').text(nombre);
                let tdApellidos = $('<td>').text(apellidos);
                let tdEdad = $('<td>').text(edad);
                let tdCiudad = $('<td>').text(ciudad);

                fila.append(tdNombre, tdApellidos, tdEdad, tdCiudad);

                return fila;
            }

            $('#formulario-persona').submit(function (event) {
                event.preventDefault();

                let nombreForm = $('#input-nombre').val().trim();
                let apellidosForm = $('#input-apellidos').val().trim();
                let edadForm = $('#input-edad').val().trim();
                let ciudadForm = $('#input-ciudad').val().trim();

                let nuevaFilaHtml = crearFilaPersona(nombreForm, apellidosForm, edadForm, ciudadForm);

                $('#cuerpo-tabla').append(nuevaFilaHtml);

                this.reset();
            });

        });
    </script>
</body>

</html>
